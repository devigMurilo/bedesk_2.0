<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta — AgendaFácil</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .card-header { background: #1e3a5f; border-radius: 16px 16px 0 0 !important; }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center py-4">
                    <h3 class="text-white mb-0"><i class="bi bi-person-plus"></i> Criar Conta</h3>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}<div class="form-text text-muted small">{{ field.help_text }}</div>{% endif %}
                            {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.as_text }}</div>{% endif %}
                        </div>
                        {% endfor %}
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold">
                            <i class="bi bi-check-circle"></i> Criar Conta
                        </button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">Já tem conta? <a href="{% url 'login' %}">Entrar</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
